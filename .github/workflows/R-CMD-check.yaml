# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: windows-latest, r: "release" }
          - { os: macos-latest, r: "release" }
          - { os: macos-latest, r: "devel" }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Install perpetual binary from R-universe
        run: |
          install.packages(
            "perpetual",
            repos = c(
              perpetual = "https://perpetual-ml.r-universe.dev",
              CRAN = "https://cloud.r-project.org"
            ),
            type = "binary"
          )
        shell: Rscript {0}

      # Install remaining dependencies via pak, but skip perpetual explicitly
      # so the lockfile step does not attempt a source rebuild.
      - name: Install remaining dependencies
        run: |
          pak::pak(c(
            "any::rcmdcheck",
            "any::parsnip",
            "any::rlang",
            "any::tibble",
            "any::workflows",
            "any::generics",
            "any::censored",
            "any::dplyr",
            "any::yardstick"
          ))
        shell: Rscript {0}

      - name: Check
        run: |
          rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--as-cran"),
            error_on = "error",
            check_dir = "check"
          )
        shell: Rscript {0}

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.os }}-r${{ matrix.config.r }}-results
          path: check
