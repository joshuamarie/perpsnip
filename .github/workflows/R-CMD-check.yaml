# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help

name: R CMD check

on:
  push:
    branches: [main, master]
    paths:
      - .github/workflows/R-CMD-check.yml
      - .Rbuildignore
      - DESCRIPTION
      - NAMESPACE
      - R/**
      - tests/**
      - vignettes/**
      - man/**
  pull_request:
    branches: [main, master]
    paths:
      - .github/workflows/R-CMD-check.yml
      - .Rbuildignore
      - DESCRIPTION
      - NAMESPACE
      - R/**
      - tests/**
      - vignettes/**
      - man/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.os }}

    name: ${{ matrix.os }} (R ${{ matrix.r }})

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux excluded: perpetual source build fails due to a monorepo
          # Cargo.toml path issue (src/rust/core/ missing from the R package
          # subtree). Re-enable once upstream fixes their Cargo workspace.
          - { os: macos-latest,   r: release }
          - { os: macos-latest,   r: devel   }
          - { os: windows-latest, r: release }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Install Rust toolchain (macOS)
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain (Windows GNU)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust -> target

      # perpetual source build is broken upstream (missing src/rust/core/Cargo.toml).
      # Install the R-universe binary before setup-r-dependencies runs so pak
      # does not attempt to rebuild it from source via the lockfile.
      - name: Install perpetual binary from R-universe
        run: |
          install.packages(
            "perpetual",
            repos = c(
              perpetual = "https://perpetual-ml.r-universe.dev",
              CRAN = "https://cloud.r-project.org"
            ),
            type = "binary"
          )
        shell: Rscript {0}

      - name: Install remaining dependencies
        run: |
          pak::pak(c(
            "any::rcmdcheck",
            "any::parsnip",
            "any::rlang",
            "any::tibble",
            "any::workflows",
            "any::generics",
            "any::censored",
            "any::dplyr",
            "any::yardstick"
          ))
        shell: Rscript {0}

      - name: Check
        run: |
          rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--as-cran"),
            error_on = "error",
            check_dir = "check"
          )
        shell: Rscript {0}

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-r${{ matrix.r }}-results
          path: check
